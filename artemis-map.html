<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Artemis — Mapa de Clínicas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#e8edf5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.phone{width:320px;background:#fff;border-radius:44px;border:8px solid #1a2535;overflow:hidden;box-shadow:0 24px 64px rgba(15,22,35,0.35),0 0 0 1px #0f1623}
.status-bar{background:#f5f6f8;height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:11px;color:#888;font-weight:500}
.map-area{position:relative;height:500px;overflow:hidden;background:#eef0f3}
.marker{position:absolute;cursor:pointer;transform:translate(-50%,-50%);transition:transform 0.15s}
.marker:hover{transform:translate(-50%,-50%) scale(1.1)}
.marker-pin{border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.2)}
.popup{position:absolute;background:white;border-radius:18px;padding:16px 20px;min-width:180px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.14);left:50%;transform:translateX(-50%)}
.popup-name{font-size:16px;font-weight:600;color:#1a2535;margin-bottom:3px}
.popup-meta{font-size:12px;color:#7a8fa6;display:flex;align-items:center;gap:4px;justify-content:center;margin-bottom:12px}
.popup-btns{display:flex;gap:7px;justify-content:center}
.popup-btn{font-size:11px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;border:none;font-family:inherit}
.popup-arrow{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:9px solid white}
.bottom-cards{position:absolute;bottom:0;left:0;right:0;display:flex;gap:10px;padding:12px 14px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.bottom-cards::-webkit-scrollbar{display:none}
.mini-card{flex-shrink:0;background:white;border-radius:18px;padding:12px 10px 10px;width:84px;display:flex;flex-direction:column;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,0.09);cursor:pointer;transition:transform 0.15s}
.mini-card:hover{transform:translateY(-2px)}
.mini-card.active{box-shadow:0 4px 16px rgba(0,0,0,0.14)}
.mini-card-icon{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center}
.mini-card-name{font-size:9px;color:#1a2535;font-weight:600;text-align:center;line-height:1.3}
.mini-card-dist{font-size:9px;color:#7a8fa6;text-align:center}
.nav-bar{background:#fff;height:72px;display:flex;align-items:center;justify-content:space-around;padding:0 8px;border-top:0.5px solid #e8eef4}
.nav-btn{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s}
.nav-btn:hover{background:#f0f4f8}
.nav-btn.active{background:#0f1623}
.legend{position:absolute;top:12px;right:12px;background:white;border-radius:12px;padding:10px 12px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.legend-item{display:flex;align-items:center;gap:7px;font-size:10px;color:#1a2535;margin-bottom:5px;font-weight:500}
.legend-item:last-child{margin-bottom:0}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
